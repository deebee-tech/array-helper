name: CI

on:
  push:
    branches: [main, beta, alpha, next]
  pull_request:
    branches: [main, beta, alpha, next]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      # `format`, not `format:check`, exited 0 no matter what: --write rewrites the runner's
      # checkout and throws the result away at teardown. eslint-config-prettier disables the
      # stylistic rules that might otherwise have caught it, so nothing backstopped this.
      - run: pnpm run format:check
      - run: pnpm run spell
      - run: pnpm run test
      - run: pnpm run build
