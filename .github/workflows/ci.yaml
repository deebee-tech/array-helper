name: CI

on:
  push:
    branches: [main, beta, alpha, next]
  pull_request:
    branches: [main, beta, alpha, next]

# Already the org default, and this job touches no secret beyond checkout's token. Stated anyway so
# a future flip of the org default cannot silently widen it, matching release.yaml and publish-jsr.
permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      # `format`, not `format:check`, exited 0 no matter what: --write rewrites the runner's
      # checkout and throws the result away at teardown. eslint-config-prettier disables the
      # stylistic rules that might otherwise have caught it, so nothing backstopped this.
      - run: pnpm run format:check
      - run: pnpm run spell
      - run: pnpm run test
      - run: pnpm run build
