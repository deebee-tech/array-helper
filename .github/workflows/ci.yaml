name: CI

on:
  push:
    branches: [main, beta, alpha, next]
  pull_request:
    branches: [main, beta, alpha, next]

# Already the org default, and this job touches no secret beyond checkout's token. Stated anyway so
# a future flip of the org default cannot silently widen it, matching release.yaml and publish-jsr.
permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      # `format`, not `format:check`, exited 0 no matter what: --write rewrites the runner's
      # checkout and throws the result away at teardown. eslint-config-prettier disables the
      # stylistic rules that might otherwise have caught it, so nothing backstopped this.
      - run: pnpm run format:check
      - run: pnpm run spell
      - run: pnpm run test
      - run: pnpm run build
