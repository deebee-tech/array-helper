name: Publish JSR

# Manual escape hatch. semantic-release normally publishes JSR as part of Release; this exists for
# when a release run publishes npm but dies before reaching JSR, leaving the two registries out of
# sync. Publishes whatever version is currently in jsr.json.
on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # JSR authenticates via OIDC — no token or secret required
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # `pnpm exec`, not `pnpm dlx`: dlx takes no version specifier, so it resolved jsr@latest fresh
      # from the registry at dispatch time and ran it inside the job holding id-token: write --
      # nothing in the repo constrained those bytes. exec runs the lockfile-pinned copy instead,
      # which is what release.yaml already does for semantic-release.
      - name: Publish to JSR
        run: pnpm exec jsr publish
